<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catalogo de libros</title>
</head>
<body>
<main>
    <section>
        <h1>Catálogo</h1>
        <br></br>
        <form id="formLibros">
        <input type="text" id="titulo" placeholder="Título">
        <input type="text" id="autor" placeholder="Autor">
        <input type="number" id="precio" placeholder="Precio">
        <label>
            Disponible
            <input type="checkbox" id="disponible">
        </label>
        <input type="text" id="genero" placeholder="Género (opcional)">
        <button type="button" id="btnAgregar">Agregar</button>
    </form>

    <!-- Contenedor para mensajes de error -->
    <div id="errorForm"></div>
    <!-- Libros -->
    <ul id="listado"></ul>
     <script src="app.js"></script>
</section>
</main>
</body>
