<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscador de libros</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .buscador {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 250px;
      outline: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    #error {
      text-align: center;
      margin-bottom: 10px;
      color: #ef4444;
    }

    #resultados {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .card p {
      margin: 3px 0;
      font-size: 14px;
      color: #cbd5f5;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>📚 Buscador de libros</h1>

  <div class="buscador">
    <input type="text" id="inputBusqueda" placeholder="Buscar libros..." />
    <button id="btnBuscar">Buscar</button>
  </div>

  <p id="error" style="display:none;"></p>

  <div id="resultados"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
