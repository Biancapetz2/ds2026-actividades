<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 30px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    #loading {
      text-align: center;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #error {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    #listaUsuarios {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: 0 auto;
    }

    #listaUsuarios li {
      background: #1e293b;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #listaUsuarios li:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    .nombre {
      font-size: 16px;
      font-weight: bold;
    }

    .email {
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <p id="loading">Cargando...</p>
  <p id="error" style="color: #ef4444; display: none;"></p>

  <h2>👤 Lista de Usuarios</h2>

  <ul id="listaUsuarios"></ul>

  <script type="module" src="./app.js"></script>
</body>
</html>
